schema: spec-driven

context: |
  Tech stack: NestJS, TypeScript
  This is a REST API backend project.

rules:
  proposal:
    - Load and apply the api-design skill before writing this artifact
    - Load and apply the nestjs-patterns skill before writing this artifact
    - Keep proposal under 2 pages; focus on why, not how

  design:
    - Load and apply the api-design skill before writing this artifact
    - Load and apply the nestjs-patterns skill before writing this artifact

  tasks:
    - Load and apply the api-design skill before writing this artifact
    - Load and apply the nestjs-patterns skill before writing this artifact
    - Each task must be implementable in one session

  apply:
    - Load and apply the nestjs-patterns skill before implementing any task
    - Load and apply the api-design skill before implementing any task involving API endpoints
